global:
  checkNewVersion: false
  sendAnonymousUsage: false

api:
  dashboard: true
  insecure: true

providers:
  docker:
    exposedByDefault: false
  file:
    directory: /etc/traefik/conf/
    watch: true

entryPoints:
  web:
    address: :80
  websecure:
    address: :443

certificatesResolvers:
  default:
    acme:
      email: ${ACME_EMAIL}
      storage: acme.json
      httpChallenge:
        entryPoint: web

log:
  level: DEBUG
  filePath: /dev/stdout
  format: json